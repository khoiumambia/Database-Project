<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - WE ARE MUSLIM | Premium Attars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #8B5E3C;
            --primary-dark: #6B4423;
            --accent: #D4AF37;
            --background: #FDF8F5;
            --surface: #FFFFFF;
            --border: #E8DDD3;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--background); }
        
        .navbar {
            background: white;
            box-shadow: var(--shadow-sm);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #2C1810;
            font-weight: 500;
        }
        
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        
        .cart-icon, .wishlist-icon {
            position: relative;
            cursor: pointer;
        }
        
        .cart-count, .wishlist-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--accent);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .shop-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }
        
        .sidebar {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }
        
        .filter-group {
            margin-bottom: 1.5rem;
        }
        
        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        /* Price Range Slider */
        .price-slider {
            margin: 1rem 0;
        }
        
        .slider {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        
        .price-values {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }
        
        .product-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }
        
        .product-badge.sold-out {
            background: var(--danger);
            color: white;
        }
        
        .product-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }
        
        .product-actions button {
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 1rem;
        }
        
        .product-price {
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .stock-status {
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }
        
        .in-stock { color: var(--success); }
        .low-stock { color: var(--warning); }
        .out-of-stock { color: var(--danger); }
        
        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 2000;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .cart-sidebar.open { right: 0; }
        
        .cart-item {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Back in Stock Modal */
        .stock-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 20px;
            z-index: 2100;
            display: none;
            width: 90%;
            max-width: 400px;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #2C1810;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            z-index: 1200;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .shop-container { grid-template-columns: 1fr; }
            .cart-sidebar { width: 100%; right: -100%; }
            .nav-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">#WE ARE MUSLIM</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="products.html">Products</a>
            <a href="compare.html">Compare</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="loyalty.html">Loyalty</a>
            <a href="affiliate.html">Affiliate</a>
            <div class="wishlist-icon" onclick="window.location.href='wishlist.html'">
                <i class="far fa-heart"></i>
                <span class="wishlist-count" id="wishlistCount">0</span>
            </div>
            <div class="cart-icon" id="openCartBtn">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</nav>

<div class="shop-container">
    <aside class="sidebar">
        <h3 style="margin-bottom: 1.5rem;">Filter Attars</h3>
        
        <div class="filter-group">
            <label>🔍 Search Products</label>
            <input type="text" id="liveSearch" placeholder="Type to search...">
        </div>
        
        <div class="filter-group">
            <label>🏷️ Brand</label>
            <select id="brandFilter"><option value="">All Brands</option></select>
        </div>
        
        <div class="filter-group">
            <label>💰 Price Range (৳)</label>
            <div class="price-slider">
                <input type="range" id="priceSlider" class="slider" min="0" max="10000" value="5000">
                <div class="price-values">
                    <span>৳0</span>
                    <span id="priceValue">৳5000</span>
                    <span>৳10000+</span>
                </div>
            </div>
        </div>
        
        <div class="filter-group">
            <label>🌸 Fragrance</label>
            <select id="fragranceFilter"><option value="">All Fragrances</option></select>
        </div>
        
        <div class="filter-group">
            <label>📊 Stock Status</label>
            <select id="stockFilter">
                <option value="all">All</option>
                <option value="in">In Stock</option>
                <option value="low">Low Stock (≤10)</option>
                <option value="out">Out of Stock</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label>⭐ Rating</label>
            <select id="ratingFilter">
                <option value="all">All Ratings</option>
                <option value="4">4★ & above</option>
                <option value="3">3★ & above</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label>🎁 Sort By</label>
            <select id="sortFilter">
                <option value="default">Default</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="newest">Newest First</option>
            </select>
        </div>
        
        <button class="btn btn-primary" id="applyFilters" style="width:100%">Apply Filters</button>
        <button class="btn" id="resetFilters" style="width:100%; margin-top:10px;">Reset All</button>
        
        <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
            <p style="font-size: 0.8rem; color: var(--text-light);">
                <i class="fas fa-tag"></i> Active Coupons:<br>
                <strong>WELCOME10</strong> (10% off)<br>
                <strong>RAMADAN20</strong> (20% off ৳2000+)
            </p>
        </div>
    </aside>
    
    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <div id="productCount"></div>
            <div>
                <button class="btn" onclick="toggleView()"><i class="fas fa-th-large"></i></button>
                <button class="btn" onclick="window.location.href='compare.html'"><i class="fas fa-chart-line"></i> Compare</button>
            </div>
        </div>
        <div class="product-grid" id="productGrid">
            <div style="text-align: center; padding: 3rem;">Loading products...</div>
        </div>
        <div id="loadMoreBtn" style="text-align: center; margin-top: 2rem; display: none;">
            <button class="btn btn-primary" onclick="loadMoreProducts()">Load More <i class="fas fa-arrow-down"></i></button>
        </div>
    </main>
</div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2>Your Cart</h2>
        <button id="closeCartBtn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>
    <div id="cartItems"></div>
    <div style="margin-top: 2rem; padding-top: 1rem; border-top: 2px solid var(--border);">
        <div style="display: flex; justify-content: space-between; margin: 0.5rem 0;">
            <strong>Subtotal:</strong>
            <span>৳<span id="cartSubtotal">0</span></span>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 0.5rem 0; color: green;">
            <strong>Discount:</strong>
            <span>-৳<span id="cartDiscount">0</span></span>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 0.5rem 0; font-size: 1.2rem;">
            <strong>Total:</strong>
            <strong>৳<span id="cartTotal">0</span></strong>
        </div>
        <div style="margin: 1rem 0;">
            <input type="text" id="cartCoupon" placeholder="Coupon code" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 12px;">
            <button class="btn" onclick="applyCartCoupon()" style="width:100%; margin-top: 0.5rem;">Apply Coupon</button>
        </div>
        <button class="btn btn-primary" id="checkoutBtn" style="width:100%; margin-top: 1rem;">Proceed to Checkout</button>
        <button class="btn" onclick="showGiftWrap()" style="width:100%; margin-top: 0.5rem;">🎁 Add Gift Wrap (+৳50)</button>
    </div>
</div>

<!-- Back in Stock Modal -->
<div class="stock-modal" id="stockModal">
    <h3>Notify Me When Back in Stock</h3>
    <p id="stockProductName"></p>
    <input type="email" id="stockEmail" placeholder="Your email address" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:12px; border:1px solid var(--border);">
    <input type="text" id="stockPhone" placeholder="Phone number (optional)" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:12px; border:1px solid var(--border);">
    <button class="btn btn-primary" onclick="saveStockAlert()" style="width:100%;">Notify Me</button>
    <button class="btn" onclick="closeStockModal()" style="width:100%; margin-top:0.5rem;">Cancel</button>
</div>

<script>
    let products = [];
    let cart = [];
    let wishlist = [];
    let appliedCoupon = null;
    let currentStockProduct = null;
    let currentPage = 1;
    const productsPerPage = 12;
    
    const coupons = [
        { code: "WELCOME10", discount: 10, minAmount: 500 },
        { code: "RAMADAN20", discount: 20, minAmount: 1000 },
        { code: "FREESHIP", discount: 5, minAmount: 2000 },
        { code: "EIDSPECIAL", discount: 25, minAmount: 3000 }
    ];
    
    // Load products
    function loadProducts() {
        const stored = localStorage.getItem('attar_products');
        if (stored) {
            products = JSON.parse(stored);
        } else {
            products = [
                { id: 1, name: "Oudh Royal", brand: "Arabian Oud", fragrance: "Woody Oud", price: 1200, stock: 15, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300", desc: "Premium pure Oudh attar", ratings: 4.8, reviews: 124 },
                { id: 2, name: "Musk Al Mahabba", brand: "Swiss Arabian", fragrance: "Musk", price: 850, stock: 0, image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=300", desc: "Intense musk fragrance", ratings: 4.6, reviews: 89 },
                { id: 3, name: "Rose De Makkah", brand: "Al Haramain", fragrance: "Rose", price: 1500, stock: 3, image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=300", desc: "Exquisite floral rose attar", ratings: 4.9, reviews: 56 },
                { id: 4, name: "Amber Night", brand: "Rasasi", fragrance: "Amber", price: 2200, stock: 20, image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=300", desc: "Warm amber blend", ratings: 4.7, reviews: 203 },
                { id: 5, name: "Sandalwood Classic", brand: "Ajmal", fragrance: "Sandalwood", price: 990, stock: 8, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300", desc: "Pure sandalwood", ratings: 4.5, reviews: 67 }
            ];
            localStorage.setItem('attar_products', JSON.stringify(products));
        }
        
        cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
        wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
        updateFilters();
        renderProducts();
        updateCartUI();
        updateWishlistCount();
    }
    
    function updateFilters() {
        const brands = [...new Set(products.map(p => p.brand))];
        const fragrances = [...new Set(products.map(p => p.fragrance))];
        
        document.getElementById('brandFilter').innerHTML = '<option value="">All Brands</option>' + 
            brands.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('fragranceFilter').innerHTML = '<option value="">All Fragrances</option>' + 
            fragrances.map(f => `<option value="${f}">${f}</option>`).join('');
    }
    
    function renderProducts() {
        const searchTerm = document.getElementById('liveSearch').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const fragrance = document.getElementById('fragranceFilter').value;
        const stockStatus = document.getElementById('stockFilter').value;
        const ratingFilter = document.getElementById('ratingFilter').value;
        const sortBy = document.getElementById('sortFilter').value;
        const maxPrice = parseInt(document.getElementById('priceSlider').value);
        
        let filtered = products.filter(p => {
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.brand.toLowerCase().includes(searchTerm)) return false;
            if (brand && p.brand !== brand) return false;
            if (fragrance && p.fragrance !== fragrance) return false;
            if (p.price > maxPrice) return false;
            if (stockStatus === 'in' && p.stock === 0) return false;
            if (stockStatus === 'low' && p.stock > 10) return false;
            if (stockStatus === 'out' && p.stock > 0) return false;
            if (ratingFilter !== 'all' && p.ratings < parseInt(ratingFilter)) return false;
            return true;
        });
        
        // Sorting
        if (sortBy === 'price_asc') filtered.sort((a,b) => a.price - b.price);
        else if (sortBy === 'price_desc') filtered.sort((a,b) => b.price - a.price);
        else if (sortBy === 'rating') filtered.sort((a,b) => b.ratings - a.ratings);
        
        document.getElementById('productCount').innerHTML = `Showing ${filtered.length} of ${products.length} products`;
        
        // Pagination
        const start = 0;
        const end = productsPerPage * currentPage;
        const paginated = filtered.slice(start, end);
        const hasMore = end < filtered.length;
        document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none';
        
        const grid = document.getElementById('productGrid');
        if (paginated.length === 0) {
            grid.innerHTML = '<div style="text-align: center; padding: 3rem;">No products found 😢</div>';
            return;
        }
        
        grid.innerHTML = paginated.map(p => `
            <div class="product-card">
                ${p.stock === 0 ? '<div class="product-badge sold-out">Sold Out</div>' : ''}
                <div class="product-actions">
                    <button onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="far fa-heart"></i></button>
                    <button onclick="event.stopPropagation(); addToCompare(${p.id})"><i class="fas fa-chart-line"></i></button>
                </div>
                <img class="product-img" src="${p.image}" onclick="viewProduct(${p.id})">
                <div class="product-info" onclick="viewProduct(${p.id})">
                    <div class="product-title">${p.name}</div>
                    <div style="font-size: 0.8rem; color: #666;">${p.brand} | ${p.fragrance}</div>
                    <div class="product-price">৳${p.price.toLocaleString()}</div>
                    <div class="stock-status ${p.stock > 10 ? 'in-stock' : (p.stock > 0 ? 'low-stock' : 'out-of-stock')}">
                        ${p.stock > 10 ? '✓ In Stock' : (p.stock > 0 ? `⚠ Only ${p.stock} left` : '✗ Out of Stock')}
                    </div>
                    <div style="font-size: 0.8rem;">⭐ ${p.ratings} (${p.reviews} reviews)</div>
                    ${p.stock > 0 ? 
                        `<button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="event.stopPropagation(); addToCart(${p.id})">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>` :
                        `<button class="btn" style="width:100%; margin-top: 10px; background: #6b7280; color: white;" onclick="event.stopPropagation(); showStockAlert(${p.id})">
                            <i class="fas fa-bell"></i> Notify Me
                        </button>`
                    }
                </div>
            </div>
        `).join('');
    }
    
    function loadMoreProducts() {
        currentPage++;
        renderProducts();
    }
    
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (product.stock === 0) {
            showStockAlert(productId);
            return;
        }
        
        let item = cart.find(i => i.id === productId);
        if (item) {
            if (item.quantity < product.stock) {
                item.quantity++;
            } else {
                showToast('Not enough stock available!');
                return;
            }
        } else {
            cart.push({ id: productId, quantity: 1 });
        }
        
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateCartUI();
        
        // Earn loyalty points
        let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
        points += Math.floor(product.price / 100);
        localStorage.setItem('loyalty_points', points);
        
        showToast(`${product.name} added to cart! +${Math.floor(product.price / 100)} points earned`);
    }
    
    function addToWishlist(productId) {
        if (!wishlist.includes(productId)) {
            wishlist.push(productId);
            localStorage.setItem('attar_wishlist', JSON.stringify(wishlist));
            updateWishlistCount();
            showToast('Added to wishlist! ❤️');
        }
    }
    
    function addToCompare(productId) {
        let compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
        if (!compareList.includes(productId) && compareList.length < 4) {
            compareList.push(productId);
            localStorage.setItem('attar_compare', JSON.stringify(compareList));
            showToast('Added to compare!');
        } else if (compareList.length >= 4) {
            showToast('Can compare up to 4 products only');
        }
    }
    
    function showStockAlert(productId) {
        currentStockProduct = products.find(p => p.id === productId);
        document.getElementById('stockProductName').innerText = currentStockProduct.name;
        document.getElementById('stockModal').style.display = 'block';
    }
    
    function saveStockAlert() {
        const email = document.getElementById('stockEmail').value;
        const phone = document.getElementById('stockPhone').value;
        
        if (!email) {
            showToast('Please enter your email address');
            return;
        }
        
        let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
        waitlist.push({
            productId: currentStockProduct.id,
            productName: currentStockProduct.name,
            email: email,
            phone: phone,
            date: new Date().toISOString(),
            notified: false
        });
        localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));
        
        showToast(`We'll notify you when ${currentStockProduct.name} is back in stock!`);
        closeStockModal();
    }
    
    function updateCartUI() {
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById('cartCount').innerText = count;
        
        let subtotal = 0;
        const cartItemsDiv = document.getElementById('cartItems');
        cartItemsDiv.innerHTML = '';
        
        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if (product) {
                const itemTotal = product.price * item.quantity;
                subtotal += itemTotal;
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${product.name}</strong><br>
                            ৳${product.price} x ${item.quantity}
                        </div>
                        <div>
                            <strong>৳${itemTotal.toLocaleString()}</strong>
                            <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: red; margin-left: 10px; cursor: pointer;">&times;</button>
                        </div>
                    </div>
                `;
            }
        });
        
        let discount = 0;
        if (appliedCoupon && subtotal >= appliedCoupon.minAmount) {
            discount = subtotal * appliedCoupon.discount / 100;
        }
        
        const total = subtotal - discount;
        document.getElementById('cartSubtotal').innerText = subtotal.toLocaleString();
        document.getElementById('cartDiscount').innerText = discount.toLocaleString();
        document.getElementById('cartTotal').innerText = total.toLocaleString();
    }
    
    function applyCartCoupon() {
        const code = document.getElementById('cartCoupon').value.toUpperCase();
        const coupon = coupons.find(c => c.code === code);
        if (coupon) {
            appliedCoupon = coupon;
            updateCartUI();
            showToast(`Coupon ${code} applied! ${coupon.discount}% off`);
        } else {
            showToast('Invalid coupon code');
        }
    }
    
    function showGiftWrap() {
        showToast('Gift wrap added to cart! +৳50');
        let subtotal = parseInt(document.getElementById('cartSubtotal').innerText.replace(/,/g, '')) || 0;
        subtotal += 50;
        document.getElementById('cartSubtotal').innerText = subtotal;
        document.getElementById('cartTotal').innerText = subtotal;
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(i => i.id !== productId);
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateCartUI();
        showToast('Removed from cart');
    }
    
    function checkout() {
        const subtotal = parseInt(document.getElementById('cartSubtotal').innerText.replace(/,/g, '')) || 0;
        if (subtotal === 0) {
            showToast('Your cart is empty!');
            return;
        }
        
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            showToast('Please login to checkout');
            window.location.href = 'dashboard.html';
            return;
        }
        
        const total = parseInt(document.getElementById('cartTotal').innerText.replace(/,/g, ''));
        
        // Payment options modal
        const paymentMethod = confirm(`💰 Total Amount: ৳${total.toLocaleString()}\n\nSelect Payment Method:\n• bKash (OK)\n• Nagad (OK)\n• Credit Card (OK)\n• Cash on Delivery (OK)\n\nClick OK to proceed to payment`);
        
        if (paymentMethod) {
            const orders = JSON.parse(localStorage.getItem('attar_orders')) || [];
            orders.push({
                id: 'ORD' + Date.now(),
                user: user.email,
                items: [...cart],
                subtotal: subtotal,
                discount: parseInt(document.getElementById('cartDiscount').innerText.replace(/,/g, '')),
                total: total,
                date: new Date().toISOString(),
                status: 'Processing',
                tracking: 'TRK' + Math.floor(Math.random() * 1000000)
            });
            localStorage.setItem('attar_orders', JSON.stringify(orders));
            
            // Earn bonus points on purchase
            let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
            points += Math.floor(total / 100);
            localStorage.setItem('loyalty_points', points);
            
            cart = [];
            appliedCoupon = null;
            localStorage.setItem('attar_cart', JSON.stringify(cart));
            updateCartUI();
            document.getElementById('cartSidebar').classList.remove('open');
            showToast(`Order placed successfully! +${Math.floor(total / 100)} points earned!`);
            window.location.href = 'order-tracking.html';
        }
    }
    
    function viewProduct(id) {
        localStorage.setItem('viewProductId', id);
        window.location.href = 'products.html';
    }
    
    function updateWishlistCount() {
        document.getElementById('wishlistCount').innerText = wishlist.length;
    }
    
    function toggleView() {
        const grid = document.getElementById('productGrid');
        if (grid.style.gridTemplateColumns === '1fr') {
            grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(280px, 1fr))';
        } else {
            grid.style.gridTemplateColumns = '1fr';
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeStockModal() {
        document.getElementById('stockModal').style.display = 'none';
        document.getElementById('stockEmail').value = '';
        document.getElementById('stockPhone').value = '';
    }
    
    // Event listeners
    document.getElementById('applyFilters').onclick = () => { currentPage = 1; renderProducts(); };
    document.getElementById('resetFilters').onclick = () => {
        document.getElementById('brandFilter').value = '';
        document.getElementById('fragranceFilter').value = '';
        document.getElementById('stockFilter').value = 'all';
        document.getElementById('ratingFilter').value = 'all';
        document.getElementById('sortFilter').value = 'default';
        document.getElementById('priceSlider').value = '5000';
        document.getElementById('priceValue').innerText = '৳5000';
        document.getElementById('liveSearch').value = '';
        currentPage = 1;
        renderProducts();
    };
    document.getElementById('openCartBtn').onclick = () => document.getElementById('cartSidebar').classList.add('open');
    document.getElementById('closeCartBtn').onclick = () => document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('checkoutBtn').onclick = checkout;
    document.getElementById('liveSearch').onkeyup = () => { currentPage = 1; renderProducts(); };
    document.getElementById('priceSlider').oninput = (e) => {
        document.getElementById('priceValue').innerText = '৳' + e.target.value;
        renderProducts();
    };
    
    loadProducts();
</script>
</body>
</html>
